<style>
:root {

  --secondary: #00d4ff;

  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; }
body, html {

  background: var(--bg);
  color: var(--text);

header {
  background: rgba(17,17,17,0.95);
  backdrop-filter: blur(12px);
  width:100%; padding:16px 0; text-align:center;
  font-size:1.6rem; font-weight:800;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  z-index:10;
  border-bottom: 1px solid rgba(255,75,145,0.3);
}
header span { background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip:text; color:transparent; }

#videoWrap {
  width:100%; max-width:1100px; min-height:300px;
  display:flex; justify-content:center; align-items:center; flex-direction:column;
  padding:20px 0;
}

video, iframe {
  width:100%; max-height:75vh; aspect-ratio:16/9;
  border-radius: var(--radius);
  border: 3px solid var(--primary);
  box-shadow: var(--glow), 0 20px 40px rgba(0,0,0,0.7);
  background:#000;
}

.ad-box {
  margin:15px 0; width:100%; max-width:728px; text-align:center;
}

.btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: 50px;
  cursor: pointer;
  font-weight: 700;
  margin: 8px;
  transition: var(--transition);
  box-shadow: var(--glow);
  text-decoration: none;
  display: inline-flex;
  align-items:center;
  gap: 8px;
  font-size: 1rem;
}
.btn:hover {
  background: #ff6b9d;
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 30px var(--primary-glow);
}

.btn-telegram { background:#0088cc !important; }
.btn-mixdrop { background:#ff4500 !important; }
.btn-streamwish { background:#1e88e5 !important; }
.btn-streamtape { background:#6a0dad !important; }
.btn-mega { background:#007bff !important; }

footer {
  text-align:center; padding:20px; color:var(--muted); width:100%;

}

#video-title {
  color: var(--primary);
  text-align:center;
  font-size:1.8rem;

  text-shadow: var(--glow);
}

#tags-container {
  width:100%; max-width:900px; padding:10px 0;
  text-align:center; border-bottom:1px solid #222;
  margin-bottom:15px;
}
.tag-link {
  display:inline-block; background:#222; color:var(--primary);
  padding:8px 16px; border-radius:30px; margin:5px;
  text-decoration:none; font-size:0.95rem; transition:var(--transition);
}
.tag-link:hover { background:var(--primary); color:white; transform:scale(1.05); }

/* Ad blocker overlay */
#adblock-warning-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.97);
  color:white; z-index:99999; backdrop-filter:blur(10px);
  justify-content:center; align-items:center; flex-direction:column;
}
</style>
</head>
<body>

<header>🎥 Dareloom <span class="hub-highlight">Hub</span></header>

<div id="adblock-warning-overlay">

<div id="main-content-wrapper" style="width:100%;max-width:1100px;flex-grow:1;display:flex;flex-direction:column;align-items:center;">
  
  <h2 id="video-title"></h2>
  
  <div id="tags-container">
    <p style="color:var(--muted);font-size:14px;margin-bottom:8px;">Tags / Categories</p>
    <div id="current-video-tags"></div>
  </div>

  <div id="videoWrap"></div>

  <!-- Ad Slots (kept your original) -->
  <div class="ad-box">
    <script type="text/javascript">
      atOptions = {'key' : 'd1be46ed95d3e2db572824c531da5082','format' : 'iframe','height' : 90,'width' : 728,'params' : {}};
    </script>

</footer>

<script>
// ==================== HELPERS ====================
function escapeHtml(s){
    return (s||'').toString()
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ==================== EMBED + DIRECT MP4 HANDLER (UPDATED FOR YOUR SHEET) ====================
function getVideoPlayer(url) {
    if (!url) return '';
    const u = url.trim().toLowerCase();

    // 🔥 DIRECT MP4 (streamtape / hgcloud) → <video> player
    if (u.includes('.mp4')) {
        return `<video controls autoplay playsinline style="width:100%;max-height:75vh;aspect-ratio:16/9;">
                    <source src="${escapeHtml(url)}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>`;
    }

    // Mixdrop / Streamwish / Streamtape embed fallback
    let embedUrl = url;
    if (u.includes('mixdrop') || u.includes('/f/')) {
        const id = u.match(/(?:\/f\/|\/)([A-Za-z0-9]{6,20})/);
        if (id) embedUrl = `https://mixdrop.co/e/${id[1]}`;
    } else if (u.includes('streamwish') || u.includes('dumbalag') || u.includes('hglink')) {
        const id = u.match(/(?:\/file\/|\/)([A-Za-z0-9_-]{10,})/);
        if (id) embedUrl = `https://streamwish.to/e/${id[1]}`;
    } else if (u.includes('streamtape')) {
        const m = u.match(/\/v\/([A-Za-z0-9_-]+)/);
        if (m) embedUrl = `https://streamtape.com/e/${m[1]}/`;
    }

    return `<iframe src="${escapeHtml(embedUrl)}" allowfullscreen allow="autoplay" style="width:100%;max-height:75vh;aspect-ratio:16/9;"></iframe>`;
}

// ==================== TITLE + TAGS ====================
function loadVideoTitle(title) {
    const el = document.getElementById('video-title');
    if (title) {
        const decoded = decodeURIComponent(title);
        el.textContent = escapeHtml(decoded);
        document.title = escapeHtml(decoded) + ' - Dareloom Hub';
    } else {
        el.textContent = 'Now Watching';
    }
}

function loadVideoTags(rawTags) {
    const container = document.getElementById('current-video-tags');
    container.innerHTML = '';
    if (!rawTags) {
        container.innerHTML = '<span style="color:var(--muted);">No tags</span>';
        return;
    }
    const tags = decodeURIComponent(rawTags).split(',').map(t => t.trim()).filter(Boolean);
    tags.forEach(tag => {
        const a = document.createElement('a');
        a.className = 'tag-link';
        a.href = `/?filter=${encodeURIComponent(tag)}`;
        a.textContent = '#' + escapeHtml(tag.toUpperCase());
        container.appendChild(a);
    });
}

// ==================== MAIN VIDEO LOADER ====================
async function loadVideo() {
    // Show content immediately (ad blocker warning is fallback)
    document.getElementById('adblock-warning-overlay').style.display = 'none';
    document.getElementById('main-content-wrapper').style.display = 'flex';

    const params = new URLSearchParams(location.search);
    const rawUrl = params.get("url");
    const titleParam = params.get("title");
    const tagsParam = params.get("tags");

    const videoWrap = document.getElementById("videoWrap");
    const ctr = document.getElementById("controls-container");
    ctr.innerHTML = '';

    if (!rawUrl) {
        videoWrap.innerHTML = "<h3 style='color:#ff4b91;'>No video link found</h3>";
        return;
    }

    loadVideoTitle(titleParam);
    loadVideoTags(tagsParam);

    const links = decodeURIComponent(rawUrl).split(",").map(l => l.trim()).filter(Boolean);
    
    let mp4Link = '';
    let telegram = '';
    let otherLinks = [];

    for (let l of links) {
        if (l.includes('t.me') || l.includes('telegram')) telegram = l;
        else if (l.includes('.mp4')) mp4Link = l;
        else otherLinks.push(l);
    }

    // 🔥 PRIORITY: Direct MP4 first (your sheet has streamtape/hgcloud mp4)
    if (mp4Link) {
        videoWrap.innerHTML = getVideoPlayer(mp4Link);
    } 
    // Fallback to embed (mixdrop etc.)
    else if (otherLinks.length) {
        videoWrap.innerHTML = getVideoPlayer(otherLinks[0]);
    } 
    else {
        videoWrap.innerHTML = "<h3 style='color:#ff4b91;'>No playable video found</h3>";
    }

    // Control Buttons (neon style)
    if (telegram) {
        ctr.innerHTML += `<a class="btn btn-telegram" href="${escapeHtml(telegram)}" target="_blank">⬇️ Telegram / Download</a>`;
    }
    otherLinks.forEach(link => {
        if (link.includes('mixdrop')) ctr.innerHTML += `<a class="btn btn-mixdrop" href="${escapeHtml(link)}" target="_blank">🔗 MixDrop</a>`;
        else if (link.includes('streamwish')) ctr.innerHTML += `<a class="btn btn-streamwish" href="${escapeHtml(link)}" target="_blank">🔗 Streamwish</a>`;
        else if (link.includes('streamtape')) ctr.innerHTML += `<a class="btn btn-streamtape" href="${escapeHtml(link)}" target="_blank">🔗 Streamtape</a>`;
    });
}

// ==================== INIT ====================
document.addEventListener("DOMContentLoaded", loadVideo);
</script>
</body>
</html>
