<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Now Watching - Dareloom Hub</title>
<meta name="robots" content="noindex, nofollow" />

<style>
:root {
  --primary: #ff4b91;
  --primary-glow: rgba(255, 75, 145, 0.6);
  --secondary: #00d4ff;
  --bg: #0a0a0a;
  --card-bg: #111111;
  --text: #f0f0f0;
  --muted: #aaaaaa;
  --glow: 0 0 20px var(--primary-glow);
  --radius: 16px;
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; }
body, html {
  margin:0; padding:0; height:100%;
  background: var(--bg);
  color: var(--text);
  font-family: "Poppins", system-ui, sans-serif;
  display:flex; flex-direction:column; align-items:center;
}

header {
  background: rgba(17,17,17,0.95);
  backdrop-filter: blur(12px);
  width:100%; padding:16px 0; text-align:center;
  font-size:1.6rem; font-weight:800;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  z-index:10;
  border-bottom: 1px solid rgba(255,75,145,0.3);
}
header span { background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip:text; color:transparent; }

#videoWrap {
  width:100%; max-width:1100px; min-height:300px;
  display:flex; justify-content:center; align-items:center; flex-direction:column;
  padding:20px 0;
}

video, iframe {
  width:100%; max-height:75vh; aspect-ratio:16/9;
  border-radius: var(--radius);
  border: 3px solid var(--primary);
  box-shadow: var(--glow), 0 20px 40px rgba(0,0,0,0.7);
  background:#000;
}

.ad-box { margin:15px 0; width:100%; max-width:728px; text-align:center; }

.btn {
  background: var(--primary);
  color: white; border: none;
  padding: 12px 20px; border-radius: 50px;
  cursor: pointer; font-weight: 700;
  margin: 6px; transition: var(--transition);
  box-shadow: var(--glow); text-decoration: none;
  display: inline-flex; align-items:center; gap: 8px; font-size: 0.9rem;
}
.btn:hover { background: #ff6b9d; transform: translateY(-2px); box-shadow: 0 0 30px var(--primary-glow); }

.btn-telegram { background:#0088cc !important; }
.btn-mixdrop { background:#ff4500 !important; }
.btn-streamwish { background:#1e88e5 !important; }
.btn-streamtape { background:#6a0dad !important; }
.btn-mega { background:#d32f2f !important; }

#video-title { color: var(--primary); text-align:center; font-size:1.6rem; margin:15px 0 5px; font-weight:700; text-shadow: var(--glow); }

#tags-container { width:100%; max-width:900px; padding:5px 0; text-align:center; border-bottom:1px solid #222; margin-bottom:15px; }
.tag-link { display:inline-block; background:#222; color:var(--primary); padding:6px 14px; border-radius:30px; margin:4px; text-decoration:none; font-size:0.85rem; transition:var(--transition); }
.tag-link:hover { background:var(--primary); color:white; }

#adblock-warning-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.97); color:white; z-index:99999; backdrop-filter:blur(10px); justify-content:center; align-items:center; flex-direction:column; }
</style>
</head>
<body>

<header>🎥 Dareloom <span class="hub-highlight">Hub</span></header>

<div id="adblock-warning-overlay">
  <h1 style="color:#ff4b91;">🚫 Ad Blocker Detected!</h1>
  <p>Please disable Ad Blocker to watch the video.</p>
</div>

<div id="main-content-wrapper" style="width:95%;max-width:1100px;flex-grow:1;display:flex;flex-direction:column;align-items:center;">
  
  <h2 id="video-title">Loading Video...</h2>
  
  <div id="tags-container">
    <div id="current-video-tags"></div>
  </div>

  <div id="videoWrap"></div>

  <p style="color:var(--muted); font-size:13px; margin-top:10px;">Select Server if video doesn't load:</p>
  <div id="controls-container" style="display:flex;justify-content:center;flex-wrap:wrap;margin-bottom:20px;"></div>

  <div class="ad-box">
    <script type="text/javascript">
      atOptions = {'key' : 'd1be46ed95d3e2db572824c531da5082','format' : 'iframe','height' : 90,'width' : 728,'params' : {}};
    </script>
    <script type="text/javascript" src="//www.highperformanceformat.com/d1be46ed95d3e2db572824c531da5082/invoke.js"></script>
  </div>
</div>

<footer>© Dareloom Hub • 18+ Only</footer>

<script>
// --- Global Links Store ---
let videoLinks = { mp4: '', mixdrop: '', streamwish: '', streamtape: '', mega: '', telegram: '' };

function escapeHtml(s){
    return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// --- URL Transformer ---
function getEmbedUrl(url){
  if(!url) return '';
  let u = url.trim();
  if(u.includes("mixdrop.") || u.includes("/f/")){
    let id = u.match(/(?:\/f\/|\/)([A-Za-z0-9]{6,20})/);
    return id ? `https://mixdrop.co/e/${id[1]}` : u;
  }
  if(u.includes("streamwish.") || u.includes("dumbalag.") || u.includes("hglink.")){
    let id = u.match(/(?:\/file\/|\/)([A-Za-z0-9_-]{10,})/);
    return id ? `https://streamwish.to/e/${id[1]}` : u;
  }
  if(u.includes("streamtape.com/v/")){
    let id = u.match(/\/v\/([A-Za-z0-9_-]+)/);
    return id ? `https://streamtape.com/e/${id[1]}/` : u;
  }
  return u;
}

// --- Player Switcher ---
function switchServer(type) {
    const videoWrap = document.getElementById("videoWrap");
    const url = videoLinks[type];
    if (!url) return;

    if (type === 'mp4') {
        videoWrap.innerHTML = `<video controls autoplay playsinline style="width:100%;max-height:75vh;aspect-ratio:16/9;"><source src="${escapeHtml(url)}" type="video/mp4">Your browser does not support the video tag.</video>`;
    } else {
        const embed = getEmbedUrl(url);
        videoWrap.innerHTML = `<iframe src="${escapeHtml(embed)}" allowfullscreen allow="autoplay"></iframe>`;
    }
}

async function loadVideo() {
    const params = new URLSearchParams(location.search);
    const rawUrl = params.get("url");
    const title = params.get("title");
    const tags = params.get("tags");

    if (title) {
        document.getElementById('video-title').textContent = decodeURIComponent(title);
        document.title = decodeURIComponent(title) + ' - Dareloom Hub';
    }

    if (tags) {
        const tagContainer = document.getElementById('current-video-tags');
        decodeURIComponent(tags).split(',').forEach(t => {
            const a = document.createElement('a');
            a.className = 'tag-link';
            a.href = `/?filter=${encodeURIComponent(t.trim())}`;
            a.textContent = '#' + t.trim().toUpperCase();
            tagContainer.appendChild(a);
        });
    }

    if (!rawUrl) {
        document.getElementById("videoWrap").innerHTML = "<h3>No Link Provided</h3>";
        return;
    }

    const links = decodeURIComponent(rawUrl).split(",").map(l => l.trim()).filter(Boolean);
    const ctr = document.getElementById("controls-container");

    links.forEach(l => {
        const low = l.toLowerCase();
        if (low.includes('.mp4')) videoLinks.mp4 = l;
        else if (low.includes('mixdrop')) videoLinks.mixdrop = l;
        else if (low.includes('streamwish') || low.includes('dumbalag')) videoLinks.streamwish = l;
        else if (low.includes('streamtape')) videoLinks.streamtape = l;
        else if (low.includes('mega.nz')) videoLinks.mega = l;
        else if (low.includes('t.me')) videoLinks.telegram = l;
    });

    // Priority Auto-Play
    if (videoLinks.mp4) switchServer('mp4');
    else if (videoLinks.streamwish) switchServer('streamwish');
    else if (videoLinks.mixdrop) switchServer('mixdrop');
    else if (videoLinks.streamtape) switchServer('streamtape');

    // Create Switcher Buttons
    if (videoLinks.mp4) ctr.innerHTML += `<button class="btn" onclick="switchServer('mp4')">⚡ Server 1 (Fast)</button>`;
    if (videoLinks.streamwish) ctr.innerHTML += `<button class="btn btn-streamwish" onclick="switchServer('streamwish')">🔗 Streamwish</button>`;
    if (videoLinks.mixdrop) ctr.innerHTML += `<button class="btn btn-mixdrop" onclick="switchServer('mixdrop')">🔗 MixDrop</button>`;
    if (videoLinks.streamtape) ctr.innerHTML += `<button class="btn btn-streamtape" onclick="switchServer('streamtape')">🔗 Streamtape</button>`;
    if (videoLinks.mega) ctr.innerHTML += `<a class="btn btn-mega" href="${escapeHtml(videoLinks.mega)}" target="_blank">📂 Mega.nz</a>`;
    if (videoLinks.telegram) ctr.innerHTML += `<a class="btn btn-telegram" href="${escapeHtml(videoLinks.telegram)}" target="_blank">⬇️ Download</a>`;
}

document.addEventListener("DOMContentLoaded", loadVideo);
</script>
</body>
</html>
